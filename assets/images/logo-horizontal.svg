<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" role="img" aria-label="Axis Law Offices — horizontal logo">
  <title>Axis Law Offices</title>
  <desc>Gold A monogram beside AXIS LAW OFFICES wordmark on navy background</desc>

  <rect width="320" height="72" fill="#13233F"/>

  <!--
    A monogram scaled to 72px tall, anchored at x≈10–62, centered vertically
    Outer A: apex (36, 8),  feet (10, 62) and (62, 62)  — slope 26/54 = 0.481/unit-y
    Inner A: apex (36, 33), feet (22, 62) and (50, 62)  — slope 14/29 = 0.483/unit-y ≈ parallel
    Crossbar at y=48 (47% up the inner A from base):
      left  x = 22 + (62-48)×26/54 = 22 + 6.7 ≈ 29
      right x = 50 − 6.7 ≈ 43
  -->

  <!-- Outer A -->
  <line x1="10" y1="62" x2="36" y2="8"  stroke="#B08D57" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="62" y1="62" x2="36" y2="8"  stroke="#B08D57" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Inner A — parallel to outer -->
  <line x1="22" y1="62" x2="36" y2="33" stroke="#B08D57" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="50" y1="62" x2="36" y2="33" stroke="#B08D57" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Crossbar -->
  <line x1="29" y1="48" x2="43" y2="48" stroke="#B08D57" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Thin vertical separator -->
  <line x1="80" y1="14" x2="80" y2="58" stroke="#B08D57" stroke-width="0.7" opacity="0.5"/>

  <!-- AXIS wordmark -->
  <text
    x="95" y="40"
    font-family="'Palatino Linotype','Book Antiqua',Palatino,'Times New Roman',serif"
    font-size="24"
    font-weight="600"
    fill="#FFFFFF"
    letter-spacing="8"
    dominant-baseline="middle"
  >AXIS</text>

  <!-- Gold rule under AXIS -->
  <line x1="95" y1="51" x2="310" y2="51" stroke="#B08D57" stroke-width="0.9"/>

  <!-- LAW OFFICES -->
  <text
    x="95" y="62"
    font-family="'Palatino Linotype','Book Antiqua',Palatino,'Times New Roman',serif"
    font-size="12"
    fill="#B08D57"
    letter-spacing="4"
    dominant-baseline="middle"
  >LAW OFFICES</text>
</svg>

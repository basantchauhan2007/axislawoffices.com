<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0E1F3D"/>

  <!-- Decorative border lines -->
  <rect x="28" y="28" width="1144" height="574" fill="none" stroke="#B08D57" stroke-width="1.2" opacity="0.5"/>
  <rect x="36" y="36" width="1128" height="558" fill="none" stroke="#B08D57" stroke-width="0.5" opacity="0.25"/>

  <!-- A Monogram -->
  <!-- Outer A: apex (196,110), feet (80,380) and (312,380) -->
  <line x1="80"  y1="380" x2="196" y2="110" stroke="#B08D57" stroke-width="13" stroke-linecap="round"/>
  <line x1="312" y1="380" x2="196" y2="110" stroke="#B08D57" stroke-width="13" stroke-linecap="round"/>
  <!-- Inner A: apex (196,180), feet (130,380) and (262,380) -->
  <line x1="130" y1="380" x2="196" y2="180" stroke="#B08D57" stroke-width="13" stroke-linecap="round"/>
  <line x1="262" y1="380" x2="196" y2="180" stroke="#B08D57" stroke-width="13" stroke-linecap="round"/>
  <!-- Crossbar -->
  <line x1="156" y1="293" x2="236" y2="293" stroke="#B08D57" stroke-width="10" stroke-linecap="round"/>

  <!-- Vertical separator -->
  <line x1="376" y1="110" x2="376" y2="490" stroke="#B08D57" stroke-width="1.5" opacity="0.45"/>

  <!-- AXIS wordmark -->
  <text x="424" y="305"
    font-family="'Palatino Linotype','Book Antiqua',Palatino,'Times New Roman',serif"
    font-size="130" font-weight="700"
    fill="#FFFFFF" letter-spacing="24"
    dominant-baseline="middle">AXIS</text>

  <!-- Gold rule -->
  <line x1="424" y1="338" x2="1140" y2="338" stroke="#B08D57" stroke-width="1.8"/>

  <!-- LAW OFFICES -->
  <text x="424" y="376"
    font-family="'Palatino Linotype','Book Antiqua',Palatino,'Times New Roman',serif"
    font-size="33" fill="#B08D57" letter-spacing="12">LAW OFFICES</text>

  <!-- Tagline -->
  <text x="424" y="434"
    font-family="Georgia,'Times New Roman',serif"
    font-size="22" font-style="italic"
    fill="rgba(255,255,255,0.58)">Trusted Legal Counsel. Principled Advocacy.</text>

  <!-- Location -->
  <text x="424" y="478"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="17" font-weight="600" letter-spacing="2.5"
    fill="rgba(176,141,87,0.65)">NEW DELHI  ·  PAN-INDIA PRACTICE</text>

  <!-- URL -->
  <text x="424" y="510"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="15" letter-spacing="1.5"
    fill="rgba(255,255,255,0.3)">www.axislawoffices.com</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 282" role="img" aria-label="Axis Law Offices logo">
  <title>Axis Law Offices</title>
  <desc>Gold double-chevron A monogram above AXIS wordmark on navy background</desc>

  <!-- Navy background -->
  <rect width="240" height="282" fill="#13233F"/>

  <!--
    A MONOGRAM
    Outer A: wide chevron, apex (120,28), feet (38,158) and (202,158)
    Inner A: narrower chevron, apex (120,56), feet (72,158) and (168,158)
    Crossbar connects inner legs at y≈110
    Both share the same baseline — no bottom line drawn (open chevron style)
  -->

  <!-- Outer A — left stroke -->
  <line x1="38"  y1="158" x2="120" y2="28"  stroke="#B08D57" stroke-width="6.5" stroke-linecap="round"/>
  <!-- Outer A — right stroke -->
  <line x1="202" y1="158" x2="120" y2="28"  stroke="#B08D57" stroke-width="6.5" stroke-linecap="round"/>

  <!-- Inner A — left stroke -->
  <line x1="72"  y1="158" x2="120" y2="56"  stroke="#B08D57" stroke-width="6.5" stroke-linecap="round"/>
  <!-- Inner A — right stroke -->
  <line x1="168" y1="158" x2="120" y2="56"  stroke="#B08D57" stroke-width="6.5" stroke-linecap="round"/>

  <!--
    Crossbar at y=110
    Inner-left at y=110: t=(110-56)/(158-56)=54/102=0.529 → x=120-0.529*(120-72)=120-25.4=94.6≈95
    Inner-right at y=110: t=0.529 → x=120+0.529*(168-120)=120+25.4=145.4≈145
  -->
  <line x1="95"  y1="110" x2="145" y2="110" stroke="#B08D57" stroke-width="5.5" stroke-linecap="round"/>

  <!-- AXIS wordmark — using system serif for SVG-as-image compatibility -->
  <text
    x="120" y="193"
    font-family="'Palatino Linotype','Book Antiqua',Palatino,'Times New Roman',serif"
    font-size="38"
    font-weight="600"
    fill="#FFFFFF"
    letter-spacing="11"
    text-anchor="middle"
    dominant-baseline="auto"
  >AXIS</text>

  <!-- Thin gold rule -->
  <line x1="34" y1="202" x2="206" y2="202" stroke="#B08D57" stroke-width="1.1"/>

  <!-- LAW OFFICES sub-text -->
  <text
    x="120" y="222"
    font-family="'Palatino Linotype','Book Antiqua',Palatino,'Times New Roman',serif"
    font-size="12.5"
    fill="#B08D57"
    letter-spacing="5"
    text-anchor="middle"
    dominant-baseline="auto"
  >LAW OFFICES</text>
</svg>
